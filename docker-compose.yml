version: "3.8"

# Runs Airflow, MLflow, and Langfuse locally.
# Start with: docker compose up -d
# MLflow UI:  http://localhost:5000
# Airflow UI: http://localhost:8080  (user: airflow / pass: airflow)
# Langfuse:   http://localhost:3000

services:

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root ./mlartifacts
    volumes:
      - mlflow_data:/mlflow

  airflow:
    image: apache/airflow:2.9.1
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: "ai-ops-secret"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    ports:
      - "8080:8080"
    volumes:
      - ./pipelines:/opt/airflow/dags
      - airflow_data:/opt/airflow
    command: >
      bash -c "airflow db init &&
               airflow users create --username airflow --password airflow
                 --firstname Air --lastname Flow --role Admin --email admin@example.com &&
               airflow webserver & airflow scheduler"

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/data/langfuse.db"
      NEXTAUTH_SECRET: "ai-ops-langfuse-secret"
      NEXTAUTH_URL: "http://localhost:3000"
      TELEMETRY_ENABLED: "false"
    volumes:
      - langfuse_data:/data

volumes:
  mlflow_data:
  airflow_data:
  langfuse_data:
